<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up — CuratedSlot</title>
  <link rel="stylesheet" href="/css/main.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-brand">CuratedSlot</div>
      <p class="auth-subtitle">Create your account</p>

      <!-- Role selector -->
      <div class="role-toggle">
        <button type="button" class="role-option selected" id="role-customer" onclick="setRole('customer')">👤 Customer</button>
        <button type="button" class="role-option" id="role-organiser" onclick="setRole('organiser')">🗓️ Organiser</button>
      </div>
      <input type="hidden" id="role-val" value="customer">

      <form id="signup-form">
        <div class="form-group">
          <label class="form-label" for="full_name">Full name</label>
          <input class="form-control" type="text" id="full_name" placeholder="Jane Smith" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="email">Email address</label>
          <input class="form-control" type="email" id="email" placeholder="you@example.com" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input class="form-control" type="password" id="password" placeholder="Min 8 characters" required minlength="8">
        </div>
        <div id="error-msg" class="form-error d-none"></div>
        <button class="btn btn-primary btn-block btn-lg mt-16" type="submit" id="submit-btn">Create Account</button>
      </form>

      <div class="auth-divider"><span>Already have an account?</span></div>
      <a href="/login.html" class="btn btn-ghost btn-block">Log in</a>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script>
    redirectIfLoggedIn();

    // Pre-select role from URL param
    const urlRole = new URLSearchParams(location.search).get('role');
    if (urlRole === 'organiser') setRole('organiser');

    function setRole(r) {
      document.getElementById('role-val').value = r;
      document.getElementById('role-customer').classList.toggle('selected', r === 'customer');
      document.getElementById('role-organiser').classList.toggle('selected', r === 'organiser');
    }

    document.getElementById('signup-form').addEventListener('submit', async e => {
      e.preventDefault();
      const btn = document.getElementById('submit-btn');
      const errEl = document.getElementById('error-msg');
      errEl.classList.add('d-none');
      btn.disabled = true;
      btn.textContent = 'Creating account…';

      const email = document.getElementById('email').value.trim();
      try {
        await api('/api/auth/signup', {
          method: 'POST', noAuth: true,
          body: {
            full_name: document.getElementById('full_name').value.trim(),
            email,
            password: document.getElementById('password').value,
            role: document.getElementById('role-val').value
          }
        });
        sessionStorage.setItem('otp_email', email);
        window.location.href = '/verify-otp.html';
      } catch (err) {
        errEl.textContent = err.message;
        errEl.classList.remove('d-none');
        btn.disabled = false;
        btn.textContent = 'Create Account';
      }
    });
  </script>
</body>
</html>
