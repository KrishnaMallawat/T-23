<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Bookings — CuratedSlot</title>
  <link rel="stylesheet" href="/css/main.css">
</head>
<body>
  <nav class="nav" id="app-nav"></nav>
  <div class="page-wrapper">
    <div class="container" style="padding-top:32px;padding-bottom:48px">
      <div class="page-header">
        <div class="page-header-inner">
          <div><h1 class="page-title">My Bookings</h1><p class="page-subtitle">Track and manage all your appointments</p></div>
        </div>
      </div>
      <div class="tabs">
        <button class="tab-btn active" onclick="filterTab('all',this)">All</button>
        <button class="tab-btn" onclick="filterTab('confirmed',this)">Upcoming</button>
        <button class="tab-btn" onclick="filterTab('completed',this)">Completed</button>
        <button class="tab-btn" onclick="filterTab('cancelled',this)">Cancelled</button>
      </div>
      <div id="bookings-container"><div class="spinner"></div></div>
    </div>
  </div>

  <!-- Cancel modal -->
  <div class="modal-overlay" id="cancel-modal">
    <div class="modal">
      <div class="modal-header">
        <h3 class="modal-title">Cancel Booking</h3>
        <button class="modal-close" onclick="closeModal('cancel-modal')">✕</button>
      </div>
      <div class="form-group">
        <label class="form-label">Reason (optional)</label>
        <textarea class="form-control" id="cancel-reason" rows="3" placeholder="Let the organiser know why…"></textarea>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="closeModal('cancel-modal')">Never mind</button>
        <button class="btn btn-danger" id="cancel-confirm-btn" onclick="doCancel()">Cancel Booking</button>
      </div>
    </div>
  </div>

  <!-- Reschedule modal -->
  <div class="modal-overlay" id="reschedule-modal">
    <div class="modal">
      <div class="modal-header">
        <h3 class="modal-title">Reschedule Booking</h3>
        <button class="modal-close" onclick="closeModal('reschedule-modal')">✕</button>
      </div>
      <div class="form-group">
        <label class="form-label">Select new date</label>
        <input type="date" class="form-control" id="rs-date" onchange="loadRescheduleSlots()">
      </div>
      <div id="rs-slots-container"></div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="closeModal('reschedule-modal')">Cancel</button>
        <button class="btn btn-primary" id="rs-confirm-btn" onclick="doReschedule()" disabled>Reschedule</button>
      </div>
    </div>
  </div>

  <!-- Reason Modal -->
  <div class="modal-overlay" id="reason-modal">
    <div class="modal">
      <div class="modal-header">
        <h3 class="modal-title">Cancellation Reason</h3>
        <button class="modal-close" onclick="closeModal('reason-modal')">✕</button>
      </div>
      <p id="reason-text" class="text-muted" style="margin:16px 0;white-space:pre-wrap;background:var(--gray-50);padding:16px;border-radius:8px;border:1px solid var(--gray-200)"></p>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal('reason-modal')">Close</button>
      </div>
    </div>
  </div>
  <!-- Payment Modal -->
  <div class="modal-overlay" id="payment-modal">
    <div class="modal" style="text-align:center">
      <div class="modal-header">
        <h3 class="modal-title">💳 Mock Payment</h3>
        <button class="modal-close" onclick="closeModal('payment-modal')">✕</button>
      </div>
      <div style="background:var(--purple-50);border-radius:var(--radius);padding:20px;margin:16px 0 20px;border:1px solid var(--purple-200)">
        <div style="font-size:13px;color:var(--gray-600);margin-bottom:4px">Amount Due</div>
        <div style="font-size:2rem;font-weight:800;color:var(--purple-700)" id="pay-amount">₹0</div>
      </div>
      <div style="background:var(--gray-100);border-radius:var(--radius-sm);padding:12px;margin-bottom:20px;font-size:13px;color:var(--gray-600);text-align:left">
        <strong style="color:var(--gray-800)">🧪 Test Mode</strong> — No real payment is processed.
      </div>
      <div class="modal-footer" style="justify-content:center;gap:12px">
        <button class="btn btn-primary" id="pay-confirm-btn" onclick="doPayment('paid')">✅ Confirm Payment</button>
        <button class="btn btn-ghost" onclick="doPayment('unpaid');closeModal('payment-modal')">✕ Skip</button>
      </div>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/my-bookings.js?v=101"></script>
</body>
</html>
