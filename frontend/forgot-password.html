<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password — CuratedSlot</title>
  <link rel="stylesheet" href="/css/main.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-brand">CuratedSlot</div>
      <p class="auth-subtitle">Enter your email and we'll send you a reset link</p>
      <form id="fp-form">
        <div class="form-group">
          <label class="form-label" for="email">Email address</label>
          <input class="form-control" type="email" id="email" placeholder="you@example.com" required>
        </div>
        <div id="success-msg" class="d-none" style="background:var(--success-bg);color:var(--success);padding:12px 14px;border-radius:var(--radius-sm);font-size:14px;margin-bottom:12px;font-weight:500"></div>
        <div id="error-msg" class="form-error d-none"></div>
        <button class="btn btn-primary btn-block btn-lg mt-16" type="submit" id="submit-btn">Send Reset Link</button>
      </form>
      <div class="auth-divider"><span>Remembered it?</span></div>
      <a href="/login.html" class="btn btn-ghost btn-block">Back to Login</a>
    </div>
  </div>
  <script src="/js/api.js"></script>
  <script>
    document.getElementById('fp-form').addEventListener('submit', async e => {
      e.preventDefault();
      const btn = document.getElementById('submit-btn');
      document.getElementById('error-msg').classList.add('d-none');
      document.getElementById('success-msg').classList.add('d-none');
      btn.disabled = true; btn.textContent = 'Sending…';
      try {
        const res = await api('/api/auth/forgot-password', { method:'POST', noAuth:true, body:{ email: document.getElementById('email').value.trim() } });
        document.getElementById('success-msg').textContent = res.message || 'Check your inbox for the reset link.';
        document.getElementById('success-msg').classList.remove('d-none');
        btn.textContent = 'Sent!';
      } catch(err) {
        document.getElementById('error-msg').textContent = err.message;
        document.getElementById('error-msg').classList.remove('d-none');
        btn.disabled = false; btn.textContent = 'Send Reset Link';
      }
    });
  </script>
</body>
</html>
