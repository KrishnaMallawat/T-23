<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — CuratedSlot</title>
  <link rel="stylesheet" href="/css/main.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-brand">CuratedSlot</div>
      <p class="auth-subtitle">Set your new password</p>
      <form id="rp-form">
        <div class="form-group">
          <label class="form-label" for="password">New password</label>
          <input class="form-control" type="password" id="password" placeholder="Min 8 characters" required minlength="8">
        </div>
        <div class="form-group">
          <label class="form-label" for="password2">Confirm new password</label>
          <input class="form-control" type="password" id="password2" placeholder="Repeat password" required>
        </div>
        <div id="error-msg" class="form-error d-none"></div>
        <button class="btn btn-primary btn-block btn-lg mt-16" type="submit" id="submit-btn">Reset Password</button>
      </form>
      <div class="auth-divider"></div>
      <a href="/login.html" class="btn btn-ghost btn-block">Back to Login</a>
    </div>
  </div>
  <script src="/js/api.js"></script>
  <script>
    const token = new URLSearchParams(location.search).get('token');
    if (!token) {
      document.querySelector('.auth-card').innerHTML = '<p class="text-center" style="color:var(--danger)">Invalid or missing reset token. <a href="/forgot-password.html">Request a new one.</a></p>';
    }

    var rpForm = document.getElementById('rp-form');
    if (rpForm) {
      rpForm.addEventListener('submit', async function(e) {
        e.preventDefault();
        var pw1 = document.getElementById('password').value;
        var pw2 = document.getElementById('password2').value;
        var errEl = document.getElementById('error-msg');
        errEl.classList.add('d-none');
        if (pw1 !== pw2) { errEl.textContent = 'Passwords do not match.'; errEl.classList.remove('d-none'); return; }
        var btn = document.getElementById('submit-btn');
        btn.disabled = true; btn.textContent = 'Resetting…';
        try {
          await api('/api/auth/reset-password', { method:'POST', noAuth:true, body:{ token: token, new_password: pw1 } });
          toast('Password reset! Please log in.', 'success');
          setTimeout(function() { window.location.href = '/login.html'; }, 1200);
        } catch(err) {
          errEl.textContent = err.message;
          errEl.classList.remove('d-none');
          btn.disabled = false; btn.textContent = 'Reset Password';
        }
      });
    }
  </script>
</body>
</html>
