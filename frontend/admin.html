<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CuratedSlot - Admin Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .stat-card {
            background: var(--surface-color);
            padding: 1.5rem;
            border-radius: var(--radius-md);
            border: 1px solid var(--border-color);
            text-align: center;
        }
        .stat-number {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--accent-color);
            margin-bottom: 0.5rem;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
        }
        th, td {
            text-align: left;
            padding: 1rem;
            border-bottom: 1px solid var(--border-color);
        }
        th {
            background: var(--bg-color);
            font-weight: 600;
            color: var(--text-secondary);
        }
    </style>
</head>
<body>

<div class="main-wrapper">
    <div class="top-nav">
        <h2>Curated<span style="color: var(--accent-color)">Slot</span> <span style="font-size:1rem; font-weight:400; color:var(--error)">| System Admin</span></h2>
        <div style="display: flex; align-items: center; gap: 1rem;">
            <span class="text-secondary">Hello, <strong id="user-name" style="color: var(--text-primary)"></strong></span>
            <button onclick="logout()" class="btn btn-outline btn-small">Sign Out</button>
        </div>
    </div>

    <!-- Stats -->
    <h3 style="margin-bottom:1rem;">Platform Overview</h3>
    <div class="grid-2" style="grid-template-columns: repeat(3, 1fr); margin-bottom: 2rem;">
        <div class="stat-card">
            <div class="stat-number" id="stat-users">0</div>
            <div class="text-secondary">Total Users</div>
        </div>
        <div class="stat-card">
            <div class="stat-number" id="stat-providers">0</div>
            <div class="text-secondary">Service Providers</div>
        </div>
        <div class="stat-card">
            <div class="stat-number" id="stat-bookings">0</div>
            <div class="text-secondary">Total Bookings</div>
        </div>
    </div>

    <!-- User Management -->
    <div class="card" style="padding:0; overflow:hidden;">
        <div style="padding:1.5rem; border-bottom:1px solid var(--border-color);">
            <h3 style="margin:0;">User Management</h3>
        </div>
        
        <div style="overflow-x:auto;">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Role</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="users-table">
                    <tr><td colspan="6" style="text-align:center;">Loading users...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script src="js/api.js"></script>
<script>
    const user = getUser();
    if (!user || user.role !== 'admin') {
        window.location.href = "index.html";
    }

    document.getElementById('user-name').innerText = user.full_name;

    async function loadStats() {
        try {
            const stats = await apiCall('/admin/stats');
            document.getElementById('stat-users').innerText = stats.total_users;
            document.getElementById('stat-providers').innerText = stats.total_providers;
            document.getElementById('stat-bookings').innerText = stats.total_appointments;
        } catch(err) {
            console.error(err);
        }
    }

    async function loadUsers() {
        try {
            const users = await apiCall('/admin/users');
            const tbody = document.getElementById('users-table');
            tbody.innerHTML = "";

            users.forEach(u => {
                const tr = document.createElement('tr');
                
                const statusBadge = u.is_active 
                    ? `<span class="badge badge-completed">Active</span>` 
                    : `<span class="badge badge-cancelled">Suspended</span>`;
                
                const roleBadge = u.role === 'admin' 
                    ? `<span class="badge" style="background:#FEE2E2; color:#DC2626">Admin</span>`
                    : u.role === 'organiser' 
                        ? `<span class="badge" style="background:#E0F2FE; color:#0284C7">Organiser</span>`
                        : `<span class="badge" style="background:#F3F4F6; color:#4B5563">Customer</span>`;

                tr.innerHTML = `
                    <td>#${u.id}</td>
                    <td><strong>${u.full_name}</strong></td>
                    <td>${u.email}</td>
                    <td>${roleBadge}</td>
                    <td>${statusBadge}</td>
                    <td>
                        <select onchange="changeRole(${u.id}, this.value)" style="width:auto; padding:0.2rem; font-size:0.8rem; margin-right:0.5rem; margin-bottom:0;">
                            <option value="customer" ${u.role==='customer'?'selected':''}>Customer</option>
                            <option value="organiser" ${u.role==='organiser'?'selected':''}>Organiser</option>
                            <option value="admin" ${u.role==='admin'?'selected':''}>Admin</option>
                        </select>
                        <button class="btn ${u.is_active ? 'btn-outline' : 'btn-primary'} btn-small" 
                                onclick="toggleStatus(${u.id}, ${u.is_active})"
                                style="${u.is_active ? 'color:var(--error); border-color:var(--error)' : ''}">
                            ${u.is_active ? 'Suspend' : 'Activate'}
                        </button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        } catch(err) {
            console.error(err);
        }
    }

    async function toggleStatus(id, isActive) {
        if (!confirm(`Are you sure you want to ${isActive ? 'suspend' : 'activate'} this user?`)) return;
        try {
            await apiCall(`/admin/users/${id}/status`, 'PATCH', { is_active: !isActive });
            loadUsers();
        } catch(err) {
            alert(err.message);
        }
    }

    async function changeRole(id, newRole) {
        if (!confirm(`Change user role to ${newRole}?`)) {
            loadUsers(); // reset select
            return;
        }
        try {
            await apiCall(`/admin/users/${id}/role`, 'PATCH', { role: newRole });
            loadUsers();
        } catch(err) {
            alert(err.message);
            loadUsers();
        }
    }

    // Init
    loadStats();
    loadUsers();
</script>
</body>
</html>
