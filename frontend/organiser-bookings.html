<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Incoming Bookings — CuratedSlot</title>
  <link rel="stylesheet" href="/css/main.css">
</head>
<body>
  <nav class="nav" id="app-nav"></nav>
  <div class="page-wrapper">
    <div class="container" style="padding-top:32px;padding-bottom:48px">
      <div class="page-header">
        <div class="page-header-inner">
          <div><h1 class="page-title">Incoming Bookings</h1><p class="page-subtitle">Manage bookings for your services</p></div>
          <select class="form-control" id="status-filter" style="width:auto" onchange="loadBookings()">
            <option value="">All statuses</option>
            <option value="pending">Pending</option>
            <option value="confirmed">Confirmed</option>
            <option value="completed">Completed</option>
            <option value="cancelled">Cancelled</option>
            <option value="no_show">No Show</option>
          </select>
        </div>
      </div>
      <div id="bookings-container"><div class="spinner"></div></div>
    </div>
  </div>
  <script src="/js/api.js"></script>
  <script src="/js/organiser-bookings.js"></script>
</body>
</html>
