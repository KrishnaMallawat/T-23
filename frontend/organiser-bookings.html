<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Incoming Bookings — CuratedSlot</title>
  <link rel="stylesheet" href="/css/main.css">
</head>
<body>
  <nav class="nav" id="app-nav"></nav>
  <div class="page-wrapper">
    <div class="container" style="padding-top:32px;padding-bottom:48px">
      <div class="page-header">
        <div class="page-header-inner">
          <div><h1 class="page-title">Incoming Bookings</h1><p class="page-subtitle">Manage bookings for your services</p></div>
          <select class="form-control" id="status-filter" style="width:auto" onchange="loadBookings()">
            <option value="">All statuses</option>
            <option value="pending">Pending</option>
            <option value="confirmed">Confirmed</option>
            <option value="completed">Completed</option>
            <option value="cancelled">Cancelled</option>
            <option value="no_show">No Show</option>
          </select>
        </div>
      </div>
      <div id="bookings-container"><div class="spinner"></div></div>
    </div>
  </div>
  <!-- Reason Modal -->
  <div class="modal-overlay" id="reason-modal">
    <div class="modal">
      <div class="modal-header">
        <h3 class="modal-title">Cancellation Reason</h3>
        <button class="modal-close" onclick="closeModal('reason-modal')">✕</button>
      </div>
      <p id="reason-text" class="text-muted" style="margin:16px 0;white-space:pre-wrap;background:var(--gray-50);padding:16px;border-radius:8px;border:1px solid var(--gray-200)"></p>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal('reason-modal')">Close</button>
      </div>
    </div>
  </div>

  <!-- Feedback Modal -->
  <div class="modal-overlay" id="feedback-modal">
    <div class="modal">
      <div class="modal-header">
        <h3 class="modal-title">Customer Feedback</h3>
        <button class="modal-close" onclick="closeModal('feedback-modal')">✕</button>
      </div>
      <div id="feedback-content" style="margin-top:16px"></div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal('feedback-modal')">Close</button>
      </div>
    </div>
  </div>

  <!-- Form Modal -->
  <div class="modal-overlay" id="form-modal">
    <div class="modal">
      <div class="modal-header">
        <h3 class="modal-title">Intake Form Answers</h3>
        <button class="modal-close" onclick="closeModal('form-modal')">✕</button>
      </div>
      <div id="form-content" style="margin-top:16px;max-height:60vh;overflow-y:auto;padding-right:8px"></div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal('form-modal')">Close</button>
      </div>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/organiser-bookings.js?v=7"></script>
</body>
</html>
